# GoStaff configuration — copy to ~/.gostaff/config.yaml

# HTTP server
server:
  addr: :8080          # port to listen on

# Logging
log_level: info        # debug | info | warn | error

# Database (Postgres)
database:
  url: postgres://gostaff:gostaff@localhost:5432/gostaff?sslmode=disable  # or set GOSTAFF_DATABASE_URL

# LLM Providers — configure at least one
providers:
  anthropic:
    api_key: ""        # or set GOSTAFF_ANTHROPIC_API_KEY
    model: claude-sonnet-4-6-20250514

  openai:
    api_key: ""        # or set GOSTAFF_OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    model: gpt-4o

  gemini:
    api_key: ""        # or set GEMINI_API_KEY / GOOGLE_API_KEY / GOSTAFF_GEMINI_API_KEY
    model: gemini-2.0-flash

  openrouter:
    api_key: ""        # or set GOSTAFF_OPENROUTER_API_KEY
    model: anthropic/claude-sonnet-4-5

# Agent defaults
agent:
  max_iterations: 25
  context_budget_pct: 0.8
  max_tool_output_tokens: 4096

# Skill directories (loaded in order; later dirs take precedence)
skills:
  dirs:
    - ~/.gostaff/skills

# Security
security:
  api_key: ""          # bearer token for REST API — empty = no auth
  rate_limit_rpm: 0    # requests/min per IP — 0 = disabled
  content_filtering: false
  session_ttl_days: 0  # 0 = keep forever
  shell_allowlist:
    - ls
    - cat
    - head
    - tail
    - grep
    - wc
    - date
    - echo
    - pwd

# Bot transports — all optional
transports:
  telegram:
    token: ""          # or set GOSTAFF_TELEGRAM_TOKEN
  discord:
    token: ""          # or set GOSTAFF_DISCORD_TOKEN
  slack:
    app_token: ""      # xapp-...
    bot_token: ""      # xoxb-...
